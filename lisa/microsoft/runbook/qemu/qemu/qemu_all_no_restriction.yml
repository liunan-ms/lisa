name: qemu all no-restriction tier1 tests
include:
  - path: ../tiers/tier.yml
variable:
  - name: keep_environment
    value: "no"
  - name: qcow2
    value: ""
  - name: extra_user_data
    value: "extra_cloud_init.yml"
testcase:
  - criteria:
      name: "verify_cpu_count|verify_deployment_provision_premium_disk|verify_deployment_provision_sriov|verify_deployment_provision_standard_ssd_disk|verify_deployment_provision_synthetic_nic|verify_deployment_provision_ultra_datadisk|verify_device_channels_change|verify_device_enabled_features|verify_device_gro_lro_settings_change|verify_dns_name_resolution|verify_essential_kernel_modules|verify_existing_script_run|verify_floppy_module_is_blacklisted|verify_gpu_provision|verify_hyperv_modules|verify_hyperv_platform_id|verify_l3_cache|verify_pmu_disabled_for_arm64|verify_reload_hyperv_modules|verify_ringbuffer_settings_change|verify_services_state|verify_sriov_basic|verify_sriov_reload_modules|verify_sriov_single_vf_connection|verify_timedrift_corrected|verify_valid_password_run|verify_vdso|verify_vm_assess_patches"
notifier:
  - type: html
platform:
  - type: qemu
    admin_private_key_file: "/home/liunan/.ssh/id_rsa"
    keep_environment: always
    qemu:
      network_boot_timeout: 300
    requirement:
      qemu:
        qcow2: "/mnt/c/Users/liunan/Downloads/azl4-vm/azl4-vm-base.x86_64-0.1-1.qcow2"
        cloud_init:
          extra_user_data: "extra_cloud_init.yml"
