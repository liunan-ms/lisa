## This file inlcudes 16 read-only tests (no reboot, no fresh VM), the execution time is 1-2 min
name: qemu read-only checks
include:
  - path: ../tiers/tier.yml
variable:
  - name: keep_environment
    value: "always"
  - name: qcow2
    value: ""
  - name: extra_user_data
    value: ""
testcase:
  - criteria:
      name: "verify_l3_cache|verify_cpu_count|verify_dns_name_resolution|verify_floppy_module_is_blacklisted|verify_default_targetpw|verify_grub|verify_udev_rules_moved|verify_serial_console_is_enabled|verify_no_pre_exist_users|verify_python_version|verify_openssl_version|verify_azure_64bit_os|verify_omi_version|verify_no_swap_on_osdisk|verify_essential_kernel_modules|verify_enable_kprobe"
notifier:
  - type: html
platform:
  - type: qemu
    admin_private_key_file: "/home/liunan/.ssh/id_rsa"
    keep_environment: $(keep_environment)
    qemu:
      network_boot_timeout: 300
    requirement:
      qemu:
        qcow2: "/mnt/c/Users/liunan/Downloads/azl4-vm/azl4-vm-base.x86_64-0.1-1.qcow2"
        cloud_init:
          extra_user_data: $(extra_user_data)
